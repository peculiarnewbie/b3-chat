packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@better-auth/infra": ^0.1.13
  "@types/dompurify": ^3.2.0
  "@types/node": ^24
  dompurify: ^3.3.3
  highlight.js: ^11.11.1
  marked: ^17.0.5
  marked-highlight: ^2.2.3
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
